<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title if title else "GPTishka Admin" }}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f5f7fb; }
    .brand { font-weight: 700; letter-spacing: 0.2px; }
    .card-soft { border: 0; border-radius: 14px; box-shadow: 0 8px 28px rgba(20, 36, 75, 0.08); }
    .top-gap { margin-top: 24px; }
  </style>
</head>
<body>
  {% if request.session.get("admin_ok") %}
  <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container">
      <a class="navbar-brand brand" href="/">GPTishka Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain" aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Дашборд</a></li>
          <li class="nav-item"><a class="nav-link" href="/orders">Заказы</a></li>
          <li class="nav-item"><a class="nav-link" href="/expiring">Истекают</a></li>
          <li class="nav-item"><a class="nav-link" href="/broadcast">Рассылка</a></li>
          <li class="nav-item"><a class="nav-link" href="/grant">Выдача</a></li>
        </ul>
        <form method="post" action="/logout" class="d-flex">
          <button class="btn btn-outline-light btn-sm" type="submit">Выйти</button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}

  <main class="container top-gap">
    {% if flash %}
    <div class="alert alert-{{ flash.kind }} alert-dismissible fade show" role="alert">
      {{ flash.message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script>
    // Lightweight replacements for used Bootstrap JS features only.
    document.addEventListener("click", (event) => {
      const toggle = event.target.closest('[data-bs-toggle="collapse"]');
      if (toggle) {
        const selector = toggle.getAttribute("data-bs-target") || toggle.getAttribute("href");
        if (selector && selector.startsWith("#")) {
          const target = document.querySelector(selector);
          if (target) {
            target.classList.toggle("show");
            toggle.setAttribute("aria-expanded", String(target.classList.contains("show")));
          }
        }
      }

      const closeAlert = event.target.closest('[data-bs-dismiss="alert"]');
      if (closeAlert) {
        const alert = closeAlert.closest(".alert");
        if (alert) {
          alert.classList.remove("show");
          if (alert.classList.contains("fade")) {
            alert.addEventListener("transitionend", () => alert.remove(), { once: true });
          } else {
            alert.remove();
          }
        }
      }
    });
  </script>
</body>
</html>
