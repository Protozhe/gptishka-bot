{% extends "base.html" %}
{% block content %}
<div class="card card-soft">
  <div class="card-body">
    <h4 class="mb-3">Истекающие подписки</h4>
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>User ID</th>
            <th>Тариф</th>
            <th>Истекает</th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{ row.user_id }}</td>
            <td>{{ row.plan_name }}</td>
            <td>{{ row.ends_local }}</td>
          </tr>
          {% else %}
          <tr><td colspan="3" class="text-muted">Нет истекающих подписок</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
